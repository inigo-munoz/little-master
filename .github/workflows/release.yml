name: Release Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PNPM_VERSION: "9.0.0"
  NODE_VERSION: "22"

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: app/backend
        run: pnpm exec prisma generate

      - run: pnpm typecheck

      - name: Test frontend
        working-directory: app/frontend
        run: pnpm test

      - name: Test backend
        working-directory: app/backend
        run: pnpm test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/desktop/src-tauri
          prefix-key: v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build frontend
        working-directory: app/frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:3001

      - name: Bundle backend
        run: bash scripts/bundle-backend.sh

      - name: Download Node portable
        run: bash scripts/download-node.sh ${{ matrix.platform }}

      - name: Prepare Tauri resources
        run: bash scripts/prepare-resources.sh

      - name: Build Tauri
        working-directory: app/desktop
        run: pnpm tauri build

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            app/desktop/src-tauri/target/release/bundle/deb/*.deb
            app/desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            app/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            app/desktop/src-tauri/target/release/bundle/msi/*.msi
            app/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
