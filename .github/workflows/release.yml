name: Release Desktop App

on:
  push:
    tags:
      - "v*"

# Least privilege at the workflow level: only the `release` job elevates to contents: write.
permissions:
  contents: read

env:
  PNPM_VERSION: "9.0.0"
  NODE_VERSION: "22"

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # This job never pushes — don't leave the write-scoped token in .git/config
          # where dependency postinstall scripts could read it.
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: app/backend
        run: pnpm exec prisma generate

      - run: pnpm typecheck

      - name: Test frontend
        working-directory: app/frontend
        run: pnpm test

      - name: Test backend
        working-directory: app/backend
        run: pnpm test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (pin 2026-07-02)

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/desktop/src-tauri
          prefix-key: v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to $VERSION"
          sed -i.bak 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' app/desktop/src-tauri/tauri.conf.json
          sed -i.bak 's/^version = "[^"]*"/version = "'"$VERSION"'"/' app/desktop/src-tauri/Cargo.toml
          sed -i.bak 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' app/desktop/package.json
          sed -i.bak 's/PRODUCT_VERSION = "[^"]*"/PRODUCT_VERSION = "'"$VERSION"'"/' packages/shared/src/app-info.ts
          rm -f app/desktop/src-tauri/tauri.conf.json.bak app/desktop/src-tauri/Cargo.toml.bak app/desktop/package.json.bak packages/shared/src/app-info.ts.bak

      - name: Build frontend
        working-directory: app/frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:3001

      - name: Bundle backend
        run: bash scripts/bundle-backend.sh

      - name: Smoke test bundle (system node)
        run: bash scripts/test-server-smoke.sh
        shell: bash

      - name: Download Node portable
        run: bash scripts/download-node.sh ${{ matrix.platform }}

      - name: Smoke test bundle (portable node)
        shell: bash
        run: |
          NODE_PORTABLE=$(find app/desktop/src-tauri/binaries -name "node-*" -type f | head -1)
          NODE_BIN="$NODE_PORTABLE" bash scripts/test-server-smoke.sh

      - name: Prepare Tauri resources
        run: bash scripts/prepare-resources.sh

      - name: Build Tauri
        working-directory: app/desktop
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            pnpm tauri build --bundles deb,rpm
          else
            pnpm tauri build
          fi
        shell: bash

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-installers
          path: |
            app/desktop/src-tauri/target/release/bundle/deb/*.deb
            app/desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-installers
          path: |
            app/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-installers
          path: |
            app/desktop/src-tauri/target/release/bundle/msi/*.msi
            app/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # Only this job needs write access to create the GitHub Release.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: |
          find . -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -exec sha256sum {} + | sed 's|  \./|  |' > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            artifacts/checksums.txt
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
